services:
  web:
    image: registry.blossomos.org/blossom/website/main:latest
    ports:
      - '4173:4173'
    environment:
      PORT: '4173'
      NODE_ENV: 'production'
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NEWSLETTER_SECRET: ${NEWSLETTER_SECRET:-}
      NEWSLETTER_FROM: ${NEWSLETTER_FROM:-}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4173/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
