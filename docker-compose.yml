services:
  website:
    image: registry.blossomos.org/blossom/website:latest
    ports:
      - '4173:3000'
    environment:
      NODE_ENV: production
      RESEND_API_KEY: ${RESEND_API_KEY}
      NEWSLETTER_SECRET: ${NEWSLETTER_SECRET}
      NEWSLETTER_FROM: ${NEWSLETTER_FROM}
      PUBLIC_POSTHOG_PROJECT_TOKEN: ${PUBLIC_POSTHOG_PROJECT_TOKEN}
      PUBLIC_POSTHOG_HOST: ${PUBLIC_POSTHOG_HOST}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
