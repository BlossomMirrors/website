services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: blossom-website:latest
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      NODE_ENV: 'production'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
